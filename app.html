    function injectDictionary(htmlString) {
        let keys = Object.keys(customDictionary).sort((a, b) => b.length - a.length);
        let tokens = htmlString.split(/(<[^>]+>)/g); 
        
        for (let i = 0; i < tokens.length; i++) {
            if (!tokens[i].startsWith('<')) { 
                let text = tokens[i];
                
                keys.forEach((word, index) => {
                    let escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    let regex = new RegExp(`(^|[^a-zA-ZçğıöşüÇĞİÖŞÜ'])(${escapedWord})(?=[^a-zA-ZçğıöşüÇĞİÖŞÜ']|$)`, 'g');
                    text = text.replace(regex, `$1###${index}###`);
                });
                
                keys.forEach((word, index) => {
                    let markerRegex = new RegExp(`###${index}###`, 'g');
                    text = text.replace(markerRegex, `<span class="dict-word" onclick="toggleTooltip(event, this)">${word}<span class="dict-tooltip">${customDictionary[word]}</span></span>`);
                });
                
                tokens[i] = text;
            }
        }
        return tokens.join('');
    }

    function toggleTooltip(event, element) {
        event.stopPropagation(); 
        document.querySelectorAll('.dict-word').forEach(el => {
            if(el !== element) el.classList.remove('active');
        });
        element.classList.toggle('active');
    }

    document.addEventListener('click', () => {
        document.querySelectorAll('.dict-word').forEach(el => el.classList.remove('active'));
    });

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    shuffleArray(lessonCards);

    let currentCardIndex = 0; 
    let currentStepIndex = 0; 
    let isEnglishRevealed = false;

    const turkishOutput = document.getElementById('turkish-output');
    const englishOutput = document.getElementById('english-output');
    const languageSeparator = document.getElementById('language-separator');
    const stepCounter = document.getElementById('step-counter');
    const globalCounter = document.getElementById('global-counter');

    function updateDisplay() {
        const currentCard = lessonCards[currentCardIndex];
        const currentStep = currentCard[currentStepIndex];

        turkishOutput.innerHTML = injectDictionary(currentStep.turkish);
        englishOutput.innerHTML = injectDictionary(currentStep.english);
        
        stepCounter.innerText = `Step ${currentStepIndex + 1} / ${currentCard.length}`;
        globalCounter.innerText = `Card ${currentCardIndex + 1} / ${lessonCards.length}`;

        if (isEnglishRevealed) {
            englishOutput.classList.add('revealed');
            languageSeparator.classList.add('revealed');
        } else {
            englishOutput.classList.remove('revealed');
            languageSeparator.classList.remove('revealed');
        }
    }

    updateDisplay();

    document.addEventListener('keydown', function(event) {
        const currentCard = lessonCards[currentCardIndex];

        if (event.key === 'ArrowUp') {
            event.preventDefault();
            if (!isEnglishRevealed) {
                isEnglishRevealed = true;
                updateDisplay();
            }
        } 
        else if (event.key === 'ArrowRight') {
            event.preventDefault();
            if (currentStepIndex < currentCard.length - 1) {
                currentStepIndex++;
                isEnglishRevealed = false; 
                updateDisplay();
            }
        } 
        else if (event.key === 'ArrowLeft') {
            event.preventDefault();
            if (isEnglishRevealed) {
                isEnglishRevealed = false;
                updateDisplay();
            } else if (currentStepIndex > 0) {
                currentStepIndex--;
                isEnglishRevealed = false; 
                updateDisplay();
            }
        }
        else if (event.key === 'ArrowDown') {
            event.preventDefault();
            if (currentCardIndex < lessonCards.length - 1) {
                currentCardIndex++;
                currentStepIndex = 0; 
                isEnglishRevealed = false; 
                updateDisplay();
            }
        }
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered.', reg))
                .catch(err => console.log('SW failed:', err));
        });
    }
</script>
